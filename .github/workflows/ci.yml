name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://racksmith:racksmith@localhost:5432/racksmith?schema=public
  BETTER_AUTH_SECRET: ci-test-secret-not-used-in-production-abcdef123456
  BETTER_AUTH_URL: http://localhost:3000

jobs:
  check:
    name: Typecheck + build + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: racksmith
          POSTGRES_PASSWORD: racksmith
          POSTGRES_DB: racksmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racksmith"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test --run

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: racksmith
          POSTGRES_PASSWORD: racksmith
          POSTGRES_DB: racksmith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U racksmith"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run smoke tests
        run: bun run test:e2e
        env:
          E2E_PORT: "3010"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
